<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Contact · Portsmouth Porchfest 2026</title>
    <meta name="description" content="Get in touch with the Portsmouth Porchfest team." />
    <meta name="theme-color" content="#F5F1E8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,400..900,0..100,0..1;1,9..144,400..900,0..100,0..1&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header id="site-nav"></header>

    <main>
      <section class="section container">
        <div class="section__head">
          <p class="eyebrow">Contact</p>
          <h1>Say hello.</h1>
        </div>
        <div class="prose">
          <p>
            Questions, ideas, or want to get involved? Email us or find us on
            social — we'd love to hear from you.
          </p>
        </div>

        <div class="contact-list">
          <a class="contact-row" data-festival-link="email-link" href="#">
            <span data-icon="email" aria-hidden="true"></span>
            <span data-festival="email"></span>
          </a>
          <a class="contact-row" data-festival-link="instagram" target="_blank" rel="noopener">
            <span data-icon="instagram" aria-hidden="true"></span>
            <span>@portsmouthporchfest</span>
          </a>
          <a class="contact-row" data-festival-link="facebook" target="_blank" rel="noopener">
            <span data-icon="facebook" aria-hidden="true"></span>
            <span>Portsmouth Porchfest</span>
          </a>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <script type="module" src="/src/pages/contact.js"></script>
  </body>
</html>
