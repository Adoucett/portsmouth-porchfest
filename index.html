<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portsmouth Porchfest 2026</title>
    <meta
      name="description"
      content="A free, grassroots neighborhood music festival in Portsmouth, NH. Saturday, September 19, 2026."
    />
    <meta name="theme-color" content="#F5F1E8" />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; box-sizing: border-box; }
      body {
        background: #f5f1e8;
        color: #1a1a18;
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
      }
      .wrap { max-width: 640px; }
      .eyebrow {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #8c8577;
      }
      h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 900;
        font-size: clamp(2.75rem, 12vw, 6rem);
        line-height: 0.95;
        margin: 0.75rem 0 1.25rem;
      }
      p { font-size: 1.1rem; line-height: 1.6; }
      .accent { color: #c4622d; font-weight: 600; }
      .rule {
        width: 48px;
        height: 2px;
        background: #1a1a18;
        margin: 1.75rem auto;
      }
      a { color: #1a1a18; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <p class="eyebrow">Portsmouth, New Hampshire</p>
      <h1>Portsmouth Porchfest</h1>
      <div class="rule"></div>
      <p>
        A free neighborhood music festival.<br />
        <span class="accent">Saturday, September 19, 2026 · 12–6 PM</span>
      </p>
      <p style="margin-top: 1rem; color: #8c8577">Something's coming.</p>
    </main>
  </body>
</html>
