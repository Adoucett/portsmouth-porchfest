<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Portsmouth Porchfest 2026</title>
    <meta
      name="description"
      content="A free, grassroots neighborhood music festival in Portsmouth, NH. Saturday, September 19, 2026. Find performers on the live map."
    />
    <meta name="theme-color" content="#F5F1E8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="Portsmouth Porchfest 2026" />
    <meta property="og:description" content="Free neighborhood music festival · Portsmouth, NH · Sept 19, 2026" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,400..900,0..100,0..1;1,9..144,400..900,0..100,0..1&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header id="site-nav"></header>

    <main>
      <!-- HERO + COUNTDOWN -->
      <section class="hero container">
        <p class="eyebrow" data-festival="dateLabel"></p>
        <h1 class="hero__title">Portsmouth<br />Porchfest</h1>
        <div class="hero__meta">
          <span data-festival="location"></span>
          <span><strong data-festival="timeLabel"></strong></span>
        </div>
        <div id="countdown" class="countdown" aria-label="Countdown to the festival"></div>
        <div class="cta__buttons">
          <a href="/map" class="btn">View the map</a>
          <a href="/get-involved" class="btn btn--ghost">Get involved</a>
        </div>
      </section>

      <!-- WHAT WE ARE -->
      <section class="section container">
        <div class="section__head">
          <p class="eyebrow">What we are</p>
          <h2>Music on every porch.</h2>
        </div>
        <div class="prose">
          <p id="what-we-are"></p>
        </div>
      </section>

      <!-- MISSION / VISION -->
      <section class="section container">
        <div class="two-col">
          <div>
            <p class="eyebrow">Our mission</p>
            <p class="lead" id="mission"></p>
          </div>
          <div>
            <p class="eyebrow">Our vision</p>
            <p class="lead" id="vision"></p>
          </div>
        </div>
      </section>

      <!-- FOLLOW -->
      <section class="section container">
        <div class="cta">
          <div class="section__head">
            <p class="eyebrow">Stay in the loop</p>
            <h2>Follow along.</h2>
          </div>
          <div class="cta__buttons">
            <a class="btn" href="/map">See the lineup map</a>
            <a class="btn btn--ghost" data-festival-link="instagram" target="_blank" rel="noopener">Instagram</a>
            <a class="btn btn--ghost" data-festival-link="facebook" target="_blank" rel="noopener">Facebook</a>
          </div>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <script type="module" src="/src/pages/home.js"></script>
  </body>
</html>
